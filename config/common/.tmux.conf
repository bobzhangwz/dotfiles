# General configuration.
# $ tmux show-options -g

set -g base-index 1
set-option -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g display-time 5000
set -g repeat-time 1000
set -g status-keys vi
set -g status-justify left
set -g status-interval 1
set -g status-left-length 15
set -g status-right-length 55
setw -g mode-keys emacs
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
# set -g status-left "#[fg=white,bright,bg=blue] Session #[fg=yellow,bright,bg=blue]#S #[default] |" # session-name
#set -g status-left "#[fg=green] #S:w#I.p#P#[default]"

set -g status-left "#[fg=green]: #h : #[default]"
set -g status-right "#[fg=red,bright][ #[fg=cyan]#{net_speed} #[fg=red]]#[default] #[fg=yellow,bright] %Y-%m-%d #[fg=green]%H:%M:%S #[default]#[fg=magenta,bright]#[default]"

# Configuration for each window.
# $ tmux show-window-options -g
setw -g window-status-format " #I$ #W "
setw -g window-status-current-format " #I$ #W "
## Use a for renaming the window prompt.
unbind ','
bind ` command-prompt -I '#W' "rename-window '%%'"

#-- bindkeys --#

set -g prefix ^o
unbind ^b
bind o send-prefix

unbind '"'
bind - splitw -v
unbind %
bind | splitw -h

bind k selectp -U
bind j selectp -D
bind h selectp -L
bind l selectp -R

bind ^k resizep -U 10
bind ^j resizep -D 10
bind ^h resizep -L 10
bind ^l resizep -R 10

bind ^u swapp -U
bind ^d swapp -D

bind ^e last

bind ! splitw ncmpcpp
bind m command-prompt "splitw -h 'exec man %%'"
bind N command-prompt "new-session -s '%%'"
bind q confirm-before -p "kill-session #P? (y/n)" kill-session
# bind @ command-prompt "splitw 'exec perldoc -t -f %%'"
bind-key s display-popup -E -w 80% -h 60% "tmux list-sessions -F '#{session_name}: #{session_windows} windows#{?session_attached, (attached),}' | fzf --prompt='Switch to session: ' | cut -d: -f1 | xargs -I {} tmux switch-client -t {}"
bind-key w display-popup -E -w 80% -h 60% "tmux list-windows -F '#{window_index}: #{window_name}#{?window_active, (active),}' | fzf --prompt='Switch to window: ' | cut -d: -f1 | xargs -I {} tmux select-window -t {}"
bind-key f display-popup -E -w 90% -h 90% -d '#{pane_current_path}' "fzf --prompt='Copy the filename: ' --preview='bat --color=always {}' | pbcopy"
bind-key ^o rotatew \; resizep -Z

# lazygit popup
bind-key g display-popup -E -xC -yC -w 95% -h 95% -d "#{pane_current_path}" lazygit
bind-key C if-shell -F '#{==:#{session_name},claude}' {
    detach-client
} {
    set -gF '@last_session_name' '#S'
    popup -d '#{pane_current_path}' -xC -yC -w90% -h90% -E 'tmux new -A -s claude -c "#{pane_current_path}" -n "$(basename "#{pane_current_path}")" "claude"'
}

bind-key \\ if-shell -F '#{==:#{session_name},debug}' {
    detach-client
} {
    set -gF '@last_session_name' '#S'
    popup -d '#{pane_current_path}' -xC -yC -w90% -h90% -E 'tmux new -A -s debug -c "#{pane_current_path}" -n "$(basename $(pwd))"'
}
#-- colorscheme --#
#-- see also: https://github.com/seebi/tmux-colors-solarized --#

# panes:
# set-option -g pane-border-fg gray
set-option -g pane-border-style 'fg=default,bg=default'
set-option -g pane-active-border-style 'fg=green,bg=green'
# message text
set-option -g message-style 'bg=colour235,fg=colour166' #base02

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green
# set net-speed for tmux
set -g @net_speed_interfaces "wlp1s0"
set -g @net_speed_format "D:%6s U:%6s"

# set -g default-terminal "screen-256color"
set -g default-terminal "rxvt-unicode-256color"
set -g default-terminal "xterm-256color"

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '60'
set -g @colors-solarized 'dark'

# set yank
set -g @custom_copy_command 'xclip -selection clipboard'
set -g @override_copy_command 'xclip -selection clipboard'

# visual notification of activity in other windows
# setw -g monitor-activity on
# set -g visual-activity on
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'seebi/tmux-colors-solarized'
# set -g @plugin 'tmux-plugins/tmux-sidebar'
# set -g @plugin 'tmux-plugins/tmux-net-speed'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

setw -g window-status-style 'bg=default,fg=#a9a9a9'
setw -g window-status-current-style 'bg=default,fg=#ffd700'
set-option -g status-style "fg=white,bg=#2b2b2b"
